name: Update Proxy List

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *' # Автоматическое обновление каждый час
  workflow_dispatch: # Кнопка для ручного запуска в Actions

permissions:
  contents: write # Разрешение боту на запись и пуш файлов в репозиторий

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Скачиваем всю историю, чтобы rebase работал корректно

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Parser Script
        run: python parser.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Добавляем обновленные файлы
          git add subscription.txt subscription_b64.txt
          
          # Делаем коммит. Если изменений в файлах нет, шаг не упадет
          git commit -m "🔄 Обновление подписок: $(date +'%Y-%m-%d %H:%M')" || exit 0
          
          # Сначала подтягиваем изменения из облака, если ветка main ушла вперед, 
          # и аккуратно дописываем наш коммит поверх них
          git pull --rebase origin main
          
          # Пушим финальный результат без конфликтов
          git push origin main
