name: Update Proxy List

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *' # Обновление каждый час
  workflow_dispatch: # Кнопка для ручного запуска

permissions:
  contents: write # Разрешение на запись файлов

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Parser Script
        run: python parser.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          # Добавляем именно твои файлы
          git add subscription.txt subscription_b64.txt
          git commit -m "🔄 Обновление подписок: $(date)" || echo "Изменений нет"
          git push
