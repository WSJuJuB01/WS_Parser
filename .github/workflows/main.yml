name: Update Proxy List

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *' # Запуск ровно в начале каждого часа
  workflow_dispatch: # Чтобы можно было тыкнуть кнопку запуска вручную

permissions:
  contents: write # Обязательно для пуша изменений

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Parser Script
        run: python parser.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add subscribe/proxy.txt
          git commit -m "🔄 Часовое обновление прокси" || echo "Нет изменений для коммита"
          git push
